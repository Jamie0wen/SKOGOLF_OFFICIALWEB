<main>
    <section id="contact">
        <h2>Contact</h2>
        <p>If you would like to get in touch regarding sponsorships or opportunities, please fill out the form below.</p>
        
        <form id="contact-form" action="https://formspree.io/f/xdapkqdd" method="POST">
            
            <!-- Honey Pot to prevent bots -->
            <input type="text" name="_honey" autocomplete="off" style="position: absolute; left: -9999px; top: -9999px;">

            <!-- Disable captcha -->
            <input type="hidden" name="_captcha" value="false">

            <label for="name">Full Name*</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address*</label>
            <input type="email" id="email" name="email" required>

            <label for="business">Business</label>
            <input type="text" id="business" name="business">

            <label for="message">Your Message*</label>
            <textarea id="message" name="message" required rows="5" maxlength="500"></textarea>
            <div id="charCount">0 / 500 characters</div>

            <button type="submit">Send Message</button>
        </form>
    </section>
</main>
